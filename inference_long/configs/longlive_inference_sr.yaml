# Ultra Flash Long Video Inference with SR cascade
# Usage: python inference_sr.py --config_path configs/longlive_inference_sr.yaml --use_sparse_sr --tiny_decoder --torch_compile --compile_sr_dit

# Architecture
denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
num_frame_per_block: 3
model_name: Wan2.1-T2V-1.3B
model_kwargs:
  local_attn_size: 12
  timestep_shift: 5.0
  sink_size: 3

# Inference
data_path: prompts/examples.txt
output_folder: outputs/
inference_iter: -1
num_output_frames: 120
use_ema: false
seed: 0
num_samples: 1
save_with_index: true
global_sink: true
context_noise: 0
independent_first_frame: true

# Generator + LoRA
generator_ckpt: checkpoints/longlive_base.pt
lora_ckpt: checkpoints/lora.pt
adapter:
  type: "lora"
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: "bfloat16"
  verbose: false

# SR cascade
sr_config: configs/sr_sparse_ultraforcing.py
sr_dit_ckpt: checkpoints/sr_dit_sparse.pth
use_sparse_sr: true
sf_chunks_per_sr: 2
sr_timestep: 1000.0
sr_kv_len: 3
condition_noise_scale: 0.0
lr_only: false
save_lr_video: false
